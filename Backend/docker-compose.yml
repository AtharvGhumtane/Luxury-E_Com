version: '3.8'

services:

  # ═══════════════════════════════════════════════════
  # DATABASES — One PostgreSQL container per service
  # ═══════════════════════════════════════════════════

  postgres-auth:
    image: postgres:16-alpine
    container_name: postgres-auth
    environment:
      POSTGRES_DB: auth_db
      POSTGRES_USER: lvmh
      POSTGRES_PASSWORD: lvmh_secret
    ports:
      - "5432:5432"
    volumes:
      - pgdata-auth:/var/lib/postgresql/data
    networks:
      - lvmh-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U lvmh -d auth_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  postgres-user:
    image: postgres:16-alpine
    container_name: postgres-user
    environment:
      POSTGRES_DB: user_db
      POSTGRES_USER: lvmh
      POSTGRES_PASSWORD: lvmh_secret
    ports:
      - "5433:5432"
    volumes:
      - pgdata-user:/var/lib/postgresql/data
    networks:
      - lvmh-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U lvmh -d user_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  postgres-product:
    image: postgres:16-alpine
    container_name: postgres-product
    environment:
      POSTGRES_DB: product_db
      POSTGRES_USER: lvmh
      POSTGRES_PASSWORD: lvmh_secret
    ports:
      - "5434:5432"
    volumes:
      - pgdata-product:/var/lib/postgresql/data
    networks:
      - lvmh-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U lvmh -d product_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  postgres-inventory:
    image: postgres:16-alpine
    container_name: postgres-inventory
    environment:
      POSTGRES_DB: inventory_db
      POSTGRES_USER: lvmh
      POSTGRES_PASSWORD: lvmh_secret
    ports:
      - "5435:5432"
    volumes:
      - pgdata-inventory:/var/lib/postgresql/data
    networks:
      - lvmh-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U lvmh -d inventory_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  postgres-order:
    image: postgres:16-alpine
    container_name: postgres-order
    environment:
      POSTGRES_DB: order_db
      POSTGRES_USER: lvmh
      POSTGRES_PASSWORD: lvmh_secret
    ports:
      - "5436:5432"
    volumes:
      - pgdata-order:/var/lib/postgresql/data
    networks:
      - lvmh-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U lvmh -d order_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  postgres-payment:
    image: postgres:16-alpine
    container_name: postgres-payment
    environment:
      POSTGRES_DB: payment_db
      POSTGRES_USER: lvmh
      POSTGRES_PASSWORD: lvmh_secret
    ports:
      - "5437:5432"
    volumes:
      - pgdata-payment:/var/lib/postgresql/data
    networks:
      - lvmh-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U lvmh -d payment_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ═══════════════════════════════════════════════════
  # REDIS — Cache, Cart, Rate Limiting
  # ═══════════════════════════════════════════════════

  redis:
    image: redis:7-alpine
    container_name: redis
    command: redis-server --appendonly yes
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    networks:
      - lvmh-net
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ═══════════════════════════════════════════════════
  # KAFKA — Event Bus (Choreography-based Saga)
  # ═══════════════════════════════════════════════════

  zookeeper:
    image: confluentinc/cp-zookeeper:7.6.0
    container_name: zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    ports:
      - "2181:2181"
    networks:
      - lvmh-net

  kafka:
    image: confluentinc/cp-kafka:7.6.0
    container_name: kafka
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: 'true'
      KAFKA_LOG_RETENTION_HOURS: 168
    networks:
      - lvmh-net
    healthcheck:
      test: ["CMD", "kafka-topics", "--bootstrap-server", "localhost:9092", "--list"]
      interval: 30s
      timeout: 10s
      retries: 5

  # ═══════════════════════════════════════════════════
  # ELASTICSEARCH — Product Search
  # ═══════════════════════════════════════════════════

  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.13.0
    container_name: elasticsearch
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - xpack.security.http.ssl.enabled=false
      - ES_JAVA_OPTS=-Xms512m -Xmx512m
    ports:
      - "9200:9200"
      - "9300:9300"
    volumes:
      - esdata:/usr/share/elasticsearch/data
    networks:
      - lvmh-net
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:9200/_cluster/health || exit 1"]
      interval: 20s
      timeout: 10s
      retries: 5

  # ═══════════════════════════════════════════════════
  # ZIPKIN — Distributed Tracing
  # ═══════════════════════════════════════════════════

  zipkin:
    image: openzipkin/zipkin:3
    container_name: zipkin
    ports:
      - "9411:9411"
    networks:
      - lvmh-net

  # ═══════════════════════════════════════════════════
  # MAILHOG — SMTP Mock for Local Development
  # ═══════════════════════════════════════════════════

  mailhog:
    image: mailhog/mailhog:v1.0.1
    container_name: mailhog
    ports:
      - "1025:1025"   # SMTP
      - "8025:8025"   # Web UI
    networks:
      - lvmh-net

  # ═══════════════════════════════════════════════════
  # SPRING BOOT SERVICES
  # ═══════════════════════════════════════════════════

  discovery-server:
    build:
      context: ./discovery-server
      dockerfile: Dockerfile
    container_name: discovery-server
    ports:
      - "8761:8761"
    networks:
      - lvmh-net
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8761/actuator/health || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 8
      start_period: 30s

  config-server:
    build:
      context: ./config-server
      dockerfile: Dockerfile
    container_name: config-server
    ports:
      - "8888:8888"
    depends_on:
      discovery-server:
        condition: service_healthy
    environment:
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://eureka:eureka_secret@discovery-server:8761/eureka/
    networks:
      - lvmh-net
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8888/actuator/health || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 8

  api-gateway:
    build:
      context: ./api-gateway
      dockerfile: Dockerfile
    container_name: api-gateway
    ports:
      - "8080:8080"
    depends_on:
      discovery-server:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://eureka:eureka_secret@discovery-server:8761/eureka/
      SPRING_DATA_REDIS_HOST: redis
      JWT_SECRET: ${JWT_SECRET:-404E635266556A586E3272357538782F413F4428472B4B6250645367566B5970}
    networks:
      - lvmh-net

  auth-service:
    build:
      context: ./auth-service
      dockerfile: Dockerfile
    container_name: auth-service
    ports:
      - "8081:8081"
    depends_on:
      postgres-auth:
        condition: service_healthy
      discovery-server:
        condition: service_healthy
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres-auth:5432/auth_db
      SPRING_DATASOURCE_USERNAME: lvmh
      SPRING_DATASOURCE_PASSWORD: lvmh_secret
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://eureka:eureka_secret@discovery-server:8761/eureka/
      JWT_SECRET: ${JWT_SECRET:-404E635266556A586E3272357538782F413F4428472B4B6250645367566B5970}
      JWT_ACCESS_EXPIRATION_MS: 900000
      JWT_REFRESH_EXPIRATION_MS: 604800000
    networks:
      - lvmh-net

  user-service:
    build:
      context: ./user-service
      dockerfile: Dockerfile
    container_name: user-service
    ports:
      - "8082:8082"
    depends_on:
      postgres-user:
        condition: service_healthy
      discovery-server:
        condition: service_healthy
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres-user:5432/user_db
      SPRING_DATASOURCE_USERNAME: lvmh
      SPRING_DATASOURCE_PASSWORD: lvmh_secret
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://eureka:eureka_secret@discovery-server:8761/eureka/
    networks:
      - lvmh-net

  product-service:
    build:
      context: ./product-service
      dockerfile: Dockerfile
    container_name: product-service
    ports:
      - "8083:8083"
    depends_on:
      postgres-product:
        condition: service_healthy
      elasticsearch:
        condition: service_healthy
      redis:
        condition: service_healthy
      discovery-server:
        condition: service_healthy
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres-product:5432/product_db
      SPRING_DATASOURCE_USERNAME: lvmh
      SPRING_DATASOURCE_PASSWORD: lvmh_secret
      SPRING_ELASTICSEARCH_URIS: http://elasticsearch:9200
      SPRING_DATA_REDIS_HOST: redis
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://eureka:eureka_secret@discovery-server:8761/eureka/
    networks:
      - lvmh-net

  inventory-service:
    build:
      context: ./inventory-service
      dockerfile: Dockerfile
    container_name: inventory-service
    ports:
      - "8084:8084"
    depends_on:
      postgres-inventory:
        condition: service_healthy
      kafka:
        condition: service_healthy
      discovery-server:
        condition: service_healthy
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres-inventory:5432/inventory_db
      SPRING_DATASOURCE_USERNAME: lvmh
      SPRING_DATASOURCE_PASSWORD: lvmh_secret
      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:29092
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://eureka:eureka_secret@discovery-server:8761/eureka/
    networks:
      - lvmh-net

  order-service:
    build:
      context: ./order-service
      dockerfile: Dockerfile
    container_name: order-service
    ports:
      - "8085:8085"
    depends_on:
      postgres-order:
        condition: service_healthy
      kafka:
        condition: service_healthy
      redis:
        condition: service_healthy
      discovery-server:
        condition: service_healthy
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres-order:5432/order_db
      SPRING_DATASOURCE_USERNAME: lvmh
      SPRING_DATASOURCE_PASSWORD: lvmh_secret
      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:29092
      SPRING_DATA_REDIS_HOST: redis
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://eureka:eureka_secret@discovery-server:8761/eureka/
    networks:
      - lvmh-net

  payment-service:
    build:
      context: ./payment-service
      dockerfile: Dockerfile
    container_name: payment-service
    ports:
      - "8086:8086"
    depends_on:
      postgres-payment:
        condition: service_healthy
      kafka:
        condition: service_healthy
      discovery-server:
        condition: service_healthy
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres-payment:5432/payment_db
      SPRING_DATASOURCE_USERNAME: lvmh
      SPRING_DATASOURCE_PASSWORD: lvmh_secret
      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:29092
      STRIPE_SECRET_KEY: ${STRIPE_SECRET_KEY:-sk_test_placeholder}
      STRIPE_WEBHOOK_SECRET: ${STRIPE_WEBHOOK_SECRET:-whsec_placeholder}
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://eureka:eureka_secret@discovery-server:8761/eureka/
    networks:
      - lvmh-net

  notification-service:
    build:
      context: ./notification-service
      dockerfile: Dockerfile
    container_name: notification-service
    ports:
      - "8087:8087"
    depends_on:
      kafka:
        condition: service_healthy
      mailhog:
        condition: service_started
      discovery-server:
        condition: service_healthy
    environment:
      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:29092
      SPRING_MAIL_HOST: mailhog
      SPRING_MAIL_PORT: 1025
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://eureka:eureka_secret@discovery-server:8761/eureka/
    networks:
      - lvmh-net

# ═══════════════════════════════════════════════════
# VOLUMES & NETWORKS
# ═══════════════════════════════════════════════════

volumes:
  pgdata-auth:
  pgdata-user:
  pgdata-product:
  pgdata-inventory:
  pgdata-order:
  pgdata-payment:
  redis-data:
  esdata:

networks:
  lvmh-net:
    driver: bridge
